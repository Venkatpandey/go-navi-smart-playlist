services:
  smart-playlist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-playlist
    restart: unless-stopped
    environment:
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_USER: your-user
      NAVIDROME_PASSWORD: your-password
      PLAYLIST_SIZE: "50"
      DRY_RUN: "false"
